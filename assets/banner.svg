<svg viewBox="0 0 1280 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0b0a"/>
      <stop offset="100%" stop-color="#141210"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>

  <rect width="1280" height="380" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#c9a45c" stroke-width="0.5">
    <line x1="0" y1="127" x2="1280" y2="127"/>
    <line x1="0" y1="253" x2="1280" y2="253"/>
    <line x1="320" y1="0" x2="320" y2="380"/>
    <line x1="640" y1="0" x2="640" y2="380"/>
    <line x1="960" y1="0" x2="960" y2="380"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="1050" cy="190" r="120" fill="#c9a45c" opacity="0.03" filter="url(#glow)"/>

  <!-- D5 particles — Row 1: mean-reverting drift, bright -->
  <circle cx="520" cy="100" r="3.5" fill="#c9a45c" opacity="0.22"/>
  <circle cx="570" cy="82" r="4.5" fill="#c9a45c" opacity="0.32"/>
  <circle cx="620" cy="65" r="5" fill="#c9a45c" opacity="0.42"/>
  <circle cx="670" cy="80" r="4" fill="#c9a45c" opacity="0.5"/>
  <circle cx="720" cy="98" r="5.5" fill="#c9a45c" opacity="0.58"/>
  <circle cx="775" cy="75" r="4.5" fill="#c9a45c" opacity="0.66"/>
  <circle cx="830" cy="58" r="6" fill="#c9a45c" opacity="0.74"/>
  <circle cx="890" cy="78" r="5" fill="#c9a45c" opacity="0.82"/>
  <circle cx="950" cy="65" r="6.5" fill="#c9a45c" opacity="0.88"/>
  <circle cx="1010" cy="82" r="5.5" fill="#c9a45c" opacity="0.92"/>
  <circle cx="1070" cy="70" r="7" fill="#c9a45c" opacity="0.96"/>
  <circle cx="1140" cy="78" r="7.5" fill="#c9a45c"/>

  <!-- Row 2: medium, wobbles around center -->
  <circle cx="530" cy="185" r="3" fill="#c9a45c" opacity="0.12"/>
  <circle cx="600" cy="200" r="4" fill="#c9a45c" opacity="0.18"/>
  <circle cx="680" cy="178" r="4.5" fill="#c9a45c" opacity="0.24"/>
  <circle cx="760" cy="198" r="3.5" fill="#c9a45c" opacity="0.3"/>
  <circle cx="840" cy="175" r="5" fill="#c9a45c" opacity="0.36"/>
  <circle cx="920" cy="200" r="4" fill="#c9a45c" opacity="0.4"/>
  <circle cx="1000" cy="185" r="5.5" fill="#c9a45c" opacity="0.45"/>
  <circle cx="1080" cy="192" r="4.5" fill="#c9a45c" opacity="0.48"/>
  <circle cx="1150" cy="180" r="6" fill="#c9a45c" opacity="0.52"/>

  <!-- Row 3: faint, drifts down then back -->
  <circle cx="560" cy="270" r="2.5" fill="#c9a45c" opacity="0.04"/>
  <circle cx="660" cy="288" r="3.5" fill="#c9a45c" opacity="0.07"/>
  <circle cx="760" cy="300" r="3.5" fill="#c9a45c" opacity="0.1"/>
  <circle cx="860" cy="290" r="3" fill="#c9a45c" opacity="0.13"/>
  <circle cx="960" cy="272" r="4" fill="#c9a45c" opacity="0.16"/>
  <circle cx="1060" cy="282" r="3.5" fill="#c9a45c" opacity="0.19"/>
  <circle cx="1150" cy="275" r="4.5" fill="#c9a45c" opacity="0.22"/>

  <!-- Title -->
  <text x="70" y="130" font-family="'DM Sans', sans-serif" font-size="68" font-weight="300" fill="#e8e4df" letter-spacing="-1">Brownian Motion</text>

  <!-- Subtitle -->
  <text x="74" y="172" font-family="'Space Mono', monospace" font-size="15" fill="#c9a45c" letter-spacing="0.05em" opacity="0.8">ORNSTEIN-UHLENBECK SCRIPT CHOP</text>

  <!-- Description -->
  <text x="74" y="215" font-family="'DM Sans', sans-serif" font-size="17" fill="#7a756e" font-weight="300">Smooth, mean-reverting procedural noise for TouchDesigner</text>

  <!-- Badges -->
  <g transform="translate(74, 240)">
    <rect width="55" height="22" rx="4" fill="#c9a45c" opacity="0.12"/>
    <text x="10" y="15" font-family="'Space Mono', monospace" font-size="10" fill="#c9a45c" letter-spacing="0.02em">v1.2</text>
  </g>
  <g transform="translate(138, 240)">
    <rect width="100" height="22" rx="4" fill="#c9a45c" opacity="0.06"/>
    <text x="10" y="15" font-family="'Space Mono', monospace" font-size="10" fill="#6a6560" letter-spacing="0.02em">TD 2025+</text>
  </g>

  <!-- Features -->
  <g font-family="'Space Mono', monospace" font-size="11" fill="#4a4540" letter-spacing="0.04em">
    <text x="74" y="340">SPRING-SMOOTHED</text>
    <text x="260" y="340">PER-AXIS RANGE</text>
    <text x="430" y="340">DETERMINISTIC</text>
    <text x="590" y="340">HEADLESS-TESTED</text>
  </g>
  <g fill="#c9a45c" opacity="0.3">
    <circle cx="245" cy="337" r="2"/>
    <circle cx="415" cy="337" r="2"/>
    <circle cx="575" cy="337" r="2"/>
  </g>
</svg>
